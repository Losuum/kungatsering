<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kungatsering 运行演示</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f4f7fb;
      color: #1a202c;
      padding: 24px;
    }
    main {
      width: min(100%, 680px);
      text-align: center;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      padding: 32px;
    }
    button {
      margin-top: 24px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background: #1d4ed8;
    }
    pre {
      margin-top: 20px;
      padding: 16px;
      background: #eef2ff;
      border-radius: 12px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main>
    <h1>kungatsering</h1>
    <p>这是一个简单的静态示例项目，已部署到 GitHub Pages。</p>
    <section>
      <h2>项目说明</h2>
      <p>这是一个简单的静态示例项目。</p>
      <ol>
        <li>打开 <code>index.html</code>。</li>
        <li>在浏览器中查看页面。</li>
        <li>点击“点击运行”按钮即可看到运行结果。</li>
      </ol>
    </section>
    <section>
      <h2>运行演示</h2>
      <button id="runBtn">点击运行</button>
      <pre id="output">等待运行……</pre>
    </section>
  </main>
  <script>
    const output = document.getElementById('output');
    document.getElementById('runBtn').addEventListener('click', () => {
      const now = new Date();
      output.textContent = `运行成功！当前时间：${now.toLocaleString()}\n\n欢迎使用 kungatsering 示例页面。`;
    });
  </script>
</body>
</html>
