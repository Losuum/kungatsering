            { date: "2024.08-2024.09", title: "མཚོ་སྔོན་འབྲོག་རའི་རྩྭ་ཐང་གི་བདག་དབང་རྟོག་ཞིབ།", role: "ཞིབ་འཇུག", details: ["མཚོ་སྔོན་གྱི་འབྲོག་ར་བཞི་ཡི་ས་ཡུལ་དངོས་ཀྱི་རྟོག་ཞིབ།", "འབྲོག་པ་25ལྷག་ལ་བདག་དབང་སྐོར་གྱི་བཅར་འདྲི་ཞུས་པ།"] },
            { date: "2024.06-2024.07", title: "ཀམ་པོ་ཙེའི་སྤྱི་ཚོགས་ལག་ལེན་རུ་ཁག ཀམ་པོ་ཙེ།", role: "ལག་ལེན", details: ["ཁ་མེར་སྲིད་དབང་སྐོར་གྱི་ཡིག་འབྲུ་5000ཡི་སྙན་ཞུ་བྲིས་པ།", "བ་དྷམ་བྷང་གི་གྲོང་གསེབ་སློབ་མ20ལྷག་ལ་རྒྱ་སྐད་བསླབས་པ་དང་སློབ་རའི་གྱང་ངོས་མཛེས་རྩལ་ལྡེབས་རིས་བྲིས་པ།", "ཆིང་ཧྭ་སློབ་ཆེན་གྱི་2024ལོའི་ལག་ལེན་རུ་ཁག་གི་དངུལ་གྱི་རྟགས་མ་ཐོབ་པ།"] },
            { date: "2023.06-2023.07", title: "ཀྲུང་གོ་དང་ཨ་རིའི་དམངས་ཁྲོད་རིག་གནས་བརྗེ་རེས་ཀྱི་ལག་ལེན། ཨ་རི།", role: "ལག་ལེན", details: ["དངོས་བཤུས་བརྙན་ཐུང་ཞིག་བཟོས་པ་དེ་ཆིང་ཧྭ་སློབ་ཆེན་གྱི་གཞུང་གཉེར་འཕྲིན་སྟེགས་སུ་སྤེལ་བ།", "ཀྲུང་གོ་དང་ཨ་རིའི་རིག་གནས་སྤེལ་རེས་མཐུན་ཚོགས་ཀྱི་མཉམ་འཛུགས་མཁན་དང་སྤེལ་གླེང་བྱེད་སྒོ་འགའ་སྒྲིག་འཛུགས་བྱས་པ།", "ཧ་ཝར་ཌི་གཙུག་ལག་སློབ་གླིང་དང་བྷུ་རུ་ཁིང་སེ་ཚན་པ། རྒྱལ་སྲིད་ཁང་སོགས་སུ་སྲིད་ཇུས་སྐོར་ལ་བགྲོ་གླེང་བྱས་པ།"] },
            { date: "2023.05", title: "རྫས་འགྱུར་དངོས་པོའི་དོ་དམ་སྤྱི་ཆིངས་གསུམ་གྱི་འཐུས་མི་ཚོགས་ཆེན། ཇེ་ནེ་ཝ། སུའེ་ཛེ།", role: "ལྟ་ཞིབ་པ།", details: ["ཀྲུང་གོའི་སྐྱེ་དངོས་སྣ་མང་རང་བཞིན་སྲུང་སྐྱོབ་དང་སྔོ་ལྗང་འཕེལ་རྒྱས་ཐེབས་རྩ་ཚོགས་པའི་དང་བླངས་པ་ཡིན་པའི་ངོས་ནས་ཟུར་ཞུགས་ཚོགས་འདུ་སྒྲིག་འཛུགས་བྱས་རོགས་དང་དེའི་སྟེང་དུ་འབྱུང་ཁམས་སྲུང་སྐྱོབ་ཁྲོད་ཀྱི་གཞོན་སྐྱེས་སྐད་སྒྲ་ཅེས་པའི་གཏམ་བཤད་སྤེལ་བ།", "ཚོགས་འདུའི་སྐོར་གྱི་གསར་འགྱུར་5ཐེབས་རྩ་ཚོགས་པའི་འཕྲིན་སྟེགས་སུ་སྤེལ་བ།"] },
            { date: "2022.06-2022.07", title: "འཛམ་གླིང་གཞོན་སྐྱེས་འཕེལ་རྒྱས་གླེང་སྟེགས་སྐབས་དང་པོ། པེ་ཅིང་། ཀྲུང་གོ", role: "ཀྲུང་གོའི་གཞོན་སྐྱེས་འཐུས་མི་དང་དང་བླངས་པ།", details: ["ཀྲུང་གོའི་གཞོན་སྐྱེས་འཐུས་མི་བྱས་ནས་ཚོགས་ཆེན་ལ་ཞུགས་པ།", "ཟུར་ཚོགས་ཀྱི་གྲ་སྒྲིག་ལ་ཞུགས་ནས་ཕྱི་འབྲེལ་གྱི་ལས་ཀའི་འགན་གཙོ་བོ་འཁུར་ཡོད།"] }
          ]
        }
      ]
    };

    let currentLang = "en";

    function byId(id) {
      return document.getElementById(id);
    }

    function renderList(items) {
      if (!items.length) return "";
      return `<ul class="details">${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function render(lang) {
      const data = resume[lang];
      document.documentElement.lang = data.htmlLang;
      document.querySelectorAll("[data-i18n]").forEach(node => {
        node.textContent = data[node.dataset.i18n];
      });

      byId("sectionNav").innerHTML = data.nav.map(([id, label]) => `<a href="#${id}">${label}</a>`).join("");

      const orderedSections = data.nav
        .map(([id]) => data.sections.find(section => section.id === id))
        .filter(Boolean);

      byId("sections").innerHTML = orderedSections.map(section => `
        <section id="${section.id}">
          <div class="section-title">
            <h2>${section.title}</h2>
            <span>${section.count}</span>
          </div>
          <div class="timeline">
            ${section.items.map(item => `
              <article class="item">
                <div class="date">${item.date}</div>
                <div>
                  <h3>${item.title}</h3>
                  <div class="role">${item.role}</div>
                  ${renderList(item.details)}
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `).join("");

      byId("skills").innerHTML = data.skills.map((skill, index) => `<span class="chip ${index > 3 ? "gold" : ""}">${skill}</span>`).join("");
      byId("awards").innerHTML = data.awards.map(([date, award]) => `
        <div class="award"><time>${date}</time><span>${award}</span></div>
      `).join("");

      document.querySelectorAll("[data-lang]").forEach(button => {
        const active = button.dataset.lang === lang;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    document.querySelectorAll("[data-lang]").forEach(button => {
      button.addEventListener("click", () => {
        currentLang = button.dataset.lang;
        render(currentLang);
      });
    });

    render(currentLang);
  </script>
